<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Genre Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS reset and variables */
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 25, 40, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 15px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        textarea::placeholder {
            color: #475569;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Area */
        .result-container {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .genre-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .scores-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .score-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .score-label {
            width: 80px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .score-bar-bg {
            flex-grow: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .score-value {
            width: 45px;
            font-size: 14px;
            font-weight: 600;
            text-align: right;
            color: #e2e8f0;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Movie Genre AI</h1>
            <p>Tulis sinopsis film dalam layar, model cerdas akan memprediksi jangkau genrenya seketika.</p>
        </div>

        <div class="input-group">
            <textarea id="overviewInput" placeholder="Contoh: A young wizard discovers his magical heritage and attends a mysterious school while facing dark forces..."></textarea>
        </div>

        <button id="predictBtn" onclick="makePrediction()">
            <span>Prediksi Genre</span>
            <div class="spinner" id="spinner"></div>
        </button>

        <div id="errorBox" class="error-message"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-title">Genre Prediksi</div>
            <div class="genre-badge" id="predictedGenre">Action</div>
            
            <div class="result-title" style="margin-top: 10px;">Skor Keyakinan (Confidence)</div>
            <div class="scores-list" id="scoresList">
                <!-- Scores injected by JS -->
            </div>
        </div>
    </div>

    <script>
        async function makePrediction() {
            const inputEl = document.getElementById('overviewInput');
            const btn = document.getElementById('predictBtn');
            const spinner = document.getElementById('spinner');
            const btnText = btn.querySelector('span');
            const resultBox = document.getElementById('resultContainer');
            const errorBox = document.getElementById('errorBox');
            
            const text = inputEl.value.trim();

            if (text.length < 10) {
                showError("Masukkan minimum 10 karakter untuk dianalisis.");
                return;
            }

            // Reset UI
            errorBox.style.display = 'none';
            resultBox.style.display = 'none';
            btn.disabled = true;
            btnText.textContent = 'Menganalisa...';
            spinner.style.display = 'block';

            try {
                // Ensure we call the correct relative endpoint
                let apiPath = window.location.origin + '/predict';
                
                // If the user's host is missing a port, fallback to full path properly
                const response = await fetch(apiPath, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ overview: text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Prediction failed.');
                }

                displayResults(data);

            } catch (err) {
                showError("Koneksi gagal atau server terputus. Detail: " + err.message);
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Prediksi Genre';
                spinner.style.display = 'none';
            }
        }

        function displayResults(data) {
            const resultBox = document.getElementById('resultContainer');
            const genreBadge = document.getElementById('predictedGenre');
            const scoresList = document.getElementById('scoresList');
            
            // Set Predicted Genre
            genreBadge.textContent = data.genre;

            // Sort scores highest to lowest
            const sortedEntries = Object.entries(data.all_scores).sort((a, b) => b[1] - a[1]);

            // Build progress bars
            scoresList.innerHTML = '';
            sortedEntries.forEach(([genreName, score]) => {
                const percentage = (score * 100).toFixed(1);
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'score-item';
                
                // Set color intensity based on score to highlight top choices
                const opacity = score == data.confidence ? '1' : '0.5';

                itemDiv.innerHTML = `
                    <div class="score-label" style="opacity: ${opacity};">${genreName}</div>
                    <div class="score-bar-bg">
                        <div class="score-bar-fill" style="width: 0%; opacity: ${opacity};"></div>
                    </div>
                    <div class="score-value" style="opacity: ${opacity};">${percentage}%</div>
                `;
                
                scoresList.appendChild(itemDiv);

                // Trigger animation after a tiny delay for CSS transition to catch
                setTimeout(() => {
                    itemDiv.querySelector('.score-bar-fill').style.width = percentage + '%';
                }, 50);
            });

            resultBox.style.display = 'block';
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        }
    </script>
</body>
</html>
